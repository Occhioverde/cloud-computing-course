apiVersion: v1
kind: Pod
metadata:
  name: mongodb
  labels:
    app: database
spec:
  containers:
  - name: mongodb
    image: mongo:latest
    ports:
    - containerPort: 27017

---

apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
spec:
  selector:
    app: database
  ports:
    - port: 27017
      targetPort: 27017

---

apiVersion: v1
kind: Pod
metadata:
  name: mongo-express
  labels:
    app: admin-ui
spec:
  containers:
  - name: mongo-express
    image: mongo-express:latest
    ports:
    - containerPort: 8081
    env:
    - name: ME_CONFIG_MONGODB_SERVER
      value: "mongodb-service"

---

apiVersion: v1
kind: Service
metadata:
  name: mongo-express-service
spec:
  type: NodePort
  selector:
    app: admin-ui
  ports:
    - port: 8081
      targetPort: 8081
